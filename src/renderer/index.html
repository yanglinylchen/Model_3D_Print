<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Model 3D Print</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="brand">Model 3D Print</div>
        <button id="newProject" title="新增專案">新增</button>
        <button id="openProject" title="開啟 .m3dp">開啟</button>
        <button id="saveProject" title="儲存 .m3dp">儲存</button>
        <span class="divider"></span>
        <button id="undo" class="icon-button" title="復原，快捷鍵 ⌘Z / Ctrl+Z">↶</button>
        <button id="redo" class="icon-button" title="重做，快捷鍵 ⌘⇧Z / Ctrl+Y">↷</button>
        <div class="mode-toggle" aria-label="滑鼠模式">
          <button id="placeMode" title="滑鼠放置方塊">放置</button>
          <button id="selectMode" title="滑鼠選取方塊">選取</button>
        </div>
        <button id="copyBlock" title="複製選取方塊">複製</button>
        <button id="pasteBlock" title="貼上到游標位置">貼上</button>
        <button id="eraseBlock" class="danger" title="刪除選取方塊，快捷鍵 Delete / Backspace">清除</button>
        <button id="rotateBlock" title="旋轉選取或待放置方塊，快捷鍵 R">旋轉</button>
        <button id="alignMaterial" title="整理相同材質方向">整理材質方向</button>
        <button id="exportStl" class="primary" title="輸出 STL">輸出 STL</button>
      </header>

      <aside class="left-panel">
        <section>
          <h2>材質</h2>
          <select id="materialList" class="picker-select" aria-label="選擇材質"></select>
        </section>
        <section>
          <h2>形狀</h2>
          <select id="shapeList" class="picker-select" aria-label="選擇形狀"></select>
        </section>
        <section>
          <h2>完成範例</h2>
          <div id="exampleList" class="example-list"></div>
        </section>
      </aside>

      <main class="viewport-shell">
        <canvas id="viewport"></canvas>
        <div id="fileProtocolWarning" class="file-protocol-warning" hidden>
          <strong>網頁版需要透過 http 或 https 開啟</strong>
          <span>請使用本機預覽伺服器或 GitHub Pages。直接雙擊 index.html 時，瀏覽器會阻擋建模核心載入。</span>
        </div>
        <div class="camera-pad" aria-label="視角控制">
          <button id="cameraLeft" title="視角左轉">↺</button>
          <button id="cameraRight" title="視角右轉">↻</button>
        </div>
        <div class="touch-hud" aria-label="觸控操作">
          <div class="touch-top-controls" aria-label="觸控設定">
            <div id="touchMaterialBar" class="touch-material-bar" aria-label="材質熱鍵列"></div>
            <button id="touchWorkspaceToggle" class="touch-workspace-toggle" title="調整工作空間">格數</button>
            <div id="touchWorkspacePanel" class="touch-workspace-panel" hidden>
              <label>X <input id="touchWorkspaceX" type="number" min="1" max="200" /></label>
              <label>Y <input id="touchWorkspaceY" type="number" min="1" max="200" /></label>
              <label>Z <input id="touchWorkspaceZ" type="number" min="1" max="200" /></label>
              <button id="touchApplyWorkspace" type="button">套用</button>
            </div>
          </div>
          <div class="touch-dpad" aria-label="游標方向">
            <button data-touch-move="forward" class="touch-dpad-up" title="游標往前">▲</button>
            <button data-touch-move="left" class="touch-dpad-left" title="游標往左">◀</button>
            <button data-touch-command="place" class="touch-dpad-center" title="放置目前物件">●</button>
            <button data-touch-move="right" class="touch-dpad-right" title="游標往右">▶</button>
            <button data-touch-move="back" class="touch-dpad-down" title="游標往後">▼</button>
          </div>
          <div class="touch-layer-pad" aria-label="高度控制">
            <button data-touch-move="up" title="游標上移一層">上</button>
            <button data-touch-move="down" title="游標下移一層">下</button>
          </div>
          <div class="touch-view-pad" aria-label="視角平移">
            <button data-touch-pan="forward" class="touch-view-up" title="視角往前">▲</button>
            <button data-touch-pan="left" class="touch-view-left" title="視角往左">◀</button>
            <button data-touch-pan="right" class="touch-view-right" title="視角往右">▶</button>
            <button data-touch-pan="back" class="touch-view-down" title="視角往後">▼</button>
          </div>
          <div class="touch-actions" aria-label="方塊操作">
            <button data-touch-command="rotate" title="旋轉目前物件">旋轉</button>
            <button data-touch-command="erase" title="清除選取物件">清除</button>
          </div>
          <div id="touchShapeBar" class="touch-shape-bar" aria-label="形狀熱鍵列"></div>
        </div>
      </main>

      <aside class="right-panel">
        <section>
          <h2>選取方塊</h2>
          <p id="selectionInfo">尚未選取</p>
          <label>
            改材質
            <select id="selectedMaterial"></select>
          </label>
        </section>
        <section>
          <h2>工作空間</h2>
          <div class="dimension-row">
            <label>X <input id="workspaceX" type="number" min="1" max="200" /></label>
            <label>Y <input id="workspaceY" type="number" min="1" max="200" /></label>
            <label>Z <input id="workspaceZ" type="number" min="1" max="200" /></label>
          </div>
          <button id="applyWorkspace">套用尺寸</button>
          <p id="blockCount"></p>
        </section>
        <section>
          <h2>自動儲存</h2>
          <p id="autosaveState">尚未自動儲存</p>
        </section>
        <section>
          <h2>STL 狀態</h2>
          <div id="exportState" class="export-state">尚未輸出</div>
        </section>
      </aside>

      <footer class="statusbar">
        <span id="cursorState"></span>
        <span id="modeState"></span>
        <span id="warningState"></span>
      </footer>

      <dialog id="recoverDialog">
        <h2>復原自動儲存？</h2>
        <p>找到比上次手動儲存更新的自動儲存內容。</p>
        <form method="dialog">
          <button value="discard">不要復原</button>
          <button value="recover" class="primary">復原</button>
        </form>
      </dialog>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "../../node_modules/three/build/three.module.js"
        }
      }
    </script>
    <script src="./web-adapter.js"></script>
    <script>
      if (window.location.protocol === "file:" && window.model3d?.platform === "web") {
        document.getElementById("fileProtocolWarning").hidden = false;
      }
    </script>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
